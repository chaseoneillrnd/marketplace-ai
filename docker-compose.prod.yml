services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    volumes: []
    command: flask --app skillhub_flask.app:create_app run --host 0.0.0.0 --port 8000

  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
      target: production
    volumes: []

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    ports:
      - "80:80"
    volumes: []
